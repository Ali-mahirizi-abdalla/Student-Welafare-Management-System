{% extends 'hms/auth_base.html' %}
{% load static %}

{% block content %}
<div class="text-center">
    <div class="mb-8 relative inline-block">
        <div class="absolute inset-0 bg-primary-100 dark:bg-primary-900/30 rounded-full animate-ping opacity-75"></div>
        <div class="relative bg-white dark:bg-slate-800 p-6 rounded-full shadow-lg border border-primary-100 dark:border-primary-900/30">
            <svg class="w-16 h-16 text-primary-600 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
        </div>
    </div>
    
    <h1 class="text-3xl font-bold text-slate-900 dark:text-white mb-3">Processing Payment...</h1>
    <p class="text-slate-600 dark:text-slate-400 mb-8 max-w-sm mx-auto">
        Please check your phone for the M-Pesa PIN prompt to pay <strong>KES 30.00</strong>.
    </p>

    <div class="bg-slate-50 dark:bg-slate-900/50 rounded-2xl p-6 border border-slate-200 dark:border-slate-800 mb-8">
        <div class="flex items-center justify-center space-x-2 text-primary-600 font-medium mb-1">
            <span id="dots" class="flex space-x-1">
                <span class="w-1.5 h-1.5 bg-current rounded-full animate-bounce"></span>
                <span class="w-1.5 h-1.5 bg-current rounded-full animate-bounce [animation-delay:0.2s]"></span>
                <span class="w-1.5 h-1.5 bg-current rounded-full animate-bounce [animation-delay:0.4s]"></span>
            </span>
            <span id="status-text">Waiting for confirmation</span>
        </div>
        <p class="text-xs text-slate-500">Do not refresh or close this page</p>
    </div>

    <div class="text-sm text-slate-500 dark:text-slate-500">
        Checkout ID: <code class="bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded">{{ checkout_id }}</code>
    </div>
</div>

<script>
    const checkoutId = "{{ checkout_id }}";
    const pollInterval = 3000; // 3 seconds
    let attempts = 0;
    const maxAttempts = 40; // ~2 minutes

    function checkStatus() {
        fetch(`/registration/check-status/${checkoutId}/`)
            .then(response => response.json())
            .then(data => {
                if (data.status === 'Success') {
                    document.getElementById('status-text').innerText = "Payment Confirmed! Redirecting...";
                    setTimeout(() => {
                        window.location.href = data.redirect_url;
                    }, 1500);
                } else if (data.status === 'Failed') {
                    document.getElementById('status-text').innerText = "Payment Failed";
                    alert(data.message || "Payment request was cancelled or timed out.");
                    window.location.href = "{% url 'hms:register' %}";
                } else if (attempts < maxAttempts) {
                    attempts++;
                    setTimeout(checkStatus, pollInterval);
                } else {
                    document.getElementById('status-text').innerText = "Request Timed Out";
                    alert("We haven't received confirmation. If you've paid, please contact support with your Checkout ID.");
                }
            })
            .catch(error => {
                console.error('Polling error:', error);
                setTimeout(checkStatus, pollInterval);
            });
    }

    // Start polling after a small delay
    setTimeout(checkStatus, 2000);
</script>
{% endblock %}
