{% extends 'library/librarian_base.html' %}

{% block title %}{{ title }}{% endblock %}
{% block header %}{{ title }}{% endblock %}

{% block content %}
<div class="card card-custom p-4 text-center" style="max-width: 500px; margin: 0 auto;">
    <h3 class="text-danger mb-4"><i class="fas fa-exclamation-triangle"></i> Are you sure?</h3>
    <p>Are you sure you want to delete <strong>{{ object }}</strong>? This action cannot be undone.</p>
    
    <form method="post" class="mt-4">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-2">
            <a href="{% url back_url %}" class="btn btn-light border px-4">Cancel</a>
            <button type="submit" class="btn btn-danger px-4">Delete</button>
        </div>
    </form>
</div>
{% endblock %}
