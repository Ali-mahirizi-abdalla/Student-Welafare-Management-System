<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Feature Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 p-8">
    <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow">
        <h1 class="text-2xl font-bold mb-6">Password Features Test</h1>

        <!-- Password Field -->
        <div class="mb-4">
            <label for="password1" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <div class="relative">
                <input type="password"
                    class="w-full pl-4 pr-10 py-2 bg-white border border-slate-300 rounded text-slate-900 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    id="password1" onkeyup="checkPasswordStrength()">
                <button type="button" onclick="togglePassword('password1')"
                    class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 focus:outline-none">
                    <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </button>
            </div>
            <!-- Password Strength Meter -->
            <div class="mt-2 h-1 w-full bg-slate-200 rounded overflow-hidden">
                <div id="strength-bar" class="h-full bg-red-500 w-0 transition-all duration-300"></div>
            </div>
            <p id="strength-text" class="text-xs text-slate-500 mt-1">Strength: <span class="font-medium">Too
                    Short</span></p>
        </div>

        <div class="mt-6 p-4 bg-blue-50 rounded">
            <h3 class="font-semibold mb-2">Instructions:</h3>
            <ol class="text-sm space-y-1">
                <li>1. Click the eye icon to toggle password visibility</li>
                <li>2. Type "abc" - should show "Too Short" (red)</li>
                <li>3. Type "password123" - should show "Medium" (yellow)</li>
                <li>4. Type "MyP@ssw0rd!" - should show "Strong" (green)</li>
            </ol>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const input = document.getElementById(fieldId);
            console.log('Toggle clicked for:', fieldId);
            if (input.type === "password") {
                input.type = "text";
                console.log('Changed to text');
            } else {
                input.type = "password";
                console.log('Changed to password');
            }
        }

        function checkPasswordStrength() {
            const password = document.getElementById('password1').value;
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');

            console.log('Checking password:', password);

            let strength = 0;

            if (password.length >= 8) strength++;
            if (password.length >= 10) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            console.log('Strength score:', strength);

            if (password.length < 5) {
                bar.style.width = '10%';
                bar.className = 'h-full bg-red-500 transition-all duration-300';
                text.innerHTML = 'Strength: <span class="font-medium text-red-500">Too Short</span>';
            } else if (strength < 3) {
                bar.style.width = '30%';
                bar.className = 'h-full bg-orange-400 transition-all duration-300';
                text.innerHTML = 'Strength: <span class="font-medium text-orange-500">Weak</span>';
            } else if (strength < 5) {
                bar.style.width = '60%';
                bar.className = 'h-full bg-yellow-400 transition-all duration-300';
                text.innerHTML = 'Strength: <span class="font-medium text-yellow-600">Medium</span>';
            } else {
                bar.style.width = '100%';
                bar.className = 'h-full bg-green-500 transition-all duration-300';
                text.innerHTML = 'Strength: <span class="font-medium text-green-600">Strong</span>';
            }
        }
    </script>
</body>

</html>
